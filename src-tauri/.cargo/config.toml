[env]
# std::filesystem (used by ggml-backend-reg.cpp in whisper.cpp) requires macOS 10.15.
# whisper-rs-sys passes CMAKE_* env vars as -D flags; cmake on macOS 26 ignores
# MACOSX_DEPLOYMENT_TARGET and auto-detects 10.13, so we set both to override it.
MACOSX_DEPLOYMENT_TARGET = "10.15"
CMAKE_OSX_DEPLOYMENT_TARGET = "10.15"
